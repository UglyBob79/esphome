id: page_poolpump
bg_color: 0xFFFFFF

widgets:
  - label:
      align: TOP_MID
      y: 12
      text: "${title}"
      text_font: font_large

  - obj:
      align: TOP_MID
      y: 48
      width: 360
      height: 2
      bg_color: 0x000000
      bg_opa: COVER
      border_width: 0
      pad_all: 0

  # Enable row — label vertically centered with switch (h:30, y:62 → mid:77)
  - label:
      id: lbl_schedule
      x: 20
      y: 63
      align: TOP_LEFT
      text: "Enable"
      text_font: font_large

  - switch:
      id: switch_pump_enable
      x: -20
      y: 62
      align: TOP_RIGHT
      width: 60
      height: 30

  # On Time row — label/colon vertically centered with tickers (h:38, y:115 → mid:134)
  - label:
      id: lbl_on_time
      x: 20
      y: 120
      align: TOP_LEFT
      text: "On Time"
      text_font: font_large

  - obj:
      id: ticker_on_hour
      x: 185
      y: 115
      align: TOP_LEFT
      width: 72
      height: 38
      bg_color: 0xFFFFFF
      bg_opa: COVER
      border_width: 2
      border_color: 0x000000
      radius: 0
      pad_all: 0
      widgets:
        - label:
            id: lbl_on_hour
            align: CENTER
            y: 3
            text_align: CENTER
            text: "00"
            text_font: font_large
            text_color: 0x000000

  - label:
      id: lbl_on_colon
      x: 261
      y: 120
      align: TOP_LEFT
      text: ":"
      text_font: font_large

  - obj:
      id: ticker_on_min
      x: 277
      y: 115
      align: TOP_LEFT
      width: 72
      height: 38
      bg_color: 0xFFFFFF
      bg_opa: COVER
      border_width: 2
      border_color: 0x000000
      radius: 0
      pad_all: 0
      widgets:
        - label:
            id: lbl_on_min
            align: CENTER
            y: 3
            text_align: CENTER
            text: "00"
            text_font: font_large
            text_color: 0x000000

  # Off Time row — label/colon vertically centered with tickers (h:38, y:177 → mid:196)
  - label:
      id: lbl_off_time
      x: 20
      y: 182
      align: TOP_LEFT
      text: "Off Time"
      text_font: font_large

  - obj:
      id: ticker_off_hour
      x: 185
      y: 177
      align: TOP_LEFT
      width: 72
      height: 38
      bg_color: 0xFFFFFF
      bg_opa: COVER
      border_width: 2
      border_color: 0x000000
      radius: 0
      pad_all: 0
      widgets:
        - label:
            id: lbl_off_hour
            align: CENTER
            y: 3
            text_align: CENTER
            text: "00"
            text_font: font_large
            text_color: 0x000000

  - label:
      id: lbl_off_colon
      x: 261
      y: 182
      align: TOP_LEFT
      text: ":"
      text_font: font_large

  - obj:
      id: ticker_off_min
      x: 277
      y: 177
      align: TOP_LEFT
      width: 72
      height: 38
      bg_color: 0xFFFFFF
      bg_opa: COVER
      border_width: 2
      border_color: 0x000000
      radius: 0
      pad_all: 0
      widgets:
        - label:
            id: lbl_off_min
            align: CENTER
            y: 3
            text_align: CENTER
            text: "00"
            text_font: font_large
            text_color: 0x000000

  - button:
      id: btn_pump_save
      align: BOTTOM_MID
      y: -15
      width: 160
      height: 44
      border_width: 2
      border_color: 0x000000
      pad_all: 0
      widgets:
        - label:
            align: CENTER
            text: "SAVE"
            text_font: font_large
            text_color: 0x000000
      on_click:
        - if:
            condition:
              lambda: 'return id(page_poolpump)->is_showing();'
            then:
              - homeassistant.service:
                  service: number.set_value
                  data:
                    entity_id: ${entity_on_hour}
                    value: !lambda 'return std::to_string(id(pump_on_hour_val));'
              - homeassistant.service:
                  service: number.set_value
                  data:
                    entity_id: ${entity_on_min}
                    value: !lambda 'return std::to_string(id(pump_on_min_val));'
              - homeassistant.service:
                  service: number.set_value
                  data:
                    entity_id: ${entity_off_hour}
                    value: !lambda 'return std::to_string(id(pump_off_hour_val));'
              - homeassistant.service:
                  service: number.set_value
                  data:
                    entity_id: ${entity_off_min}
                    value: !lambda 'return std::to_string(id(pump_off_min_val));'
              - if:
                  condition:
                    lambda: 'return id(pump_enable_val);'
                  then:
                    - homeassistant.service:
                        service: switch.turn_on
                        data:
                          entity_id: ${entity_enable}
                  else:
                    - homeassistant.service:
                        service: switch.turn_off
                        data:
                          entity_id: ${entity_enable}
