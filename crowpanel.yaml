substitutions:
  node_name: crowpanel
  friendly_node_name: CrowPanel
  timezone: Europe/Stockholm
  page_font: font_large

logger:
  level: VERY_VERBOSE

packages:
  common: !include ../esphome-common/common/common_eink.yaml
  hardware: !include ../esphome-common/hardware/esp32/crowpanel-4.2.yaml
  eink_theme: !include ../esphome-eink-ui/config/eink_theme.yaml
  pages: !include crowpanel_pages.yaml

external_components:
  - source:
      type: local
      path: components
    components: [crowpanel_epaper]
  - source:
      type: local
      path: ../esphome-eink-ui/components
    components: [page]

globals:
  - id: first_render
    type: bool
    restore_value: false
    initial_value: 'true'

binary_sensor:
  - id: !extend btn_menu
    filters:
      - delayed_on: 100ms
    on_press:
      - lvgl.page.next:
          animation: NONE

  - id: !extend btn_exit
    filters:
      - delayed_on: 100ms
    on_press:
      - lvgl.page.previous:
          animation: NONE

  - id: !extend btn_confirm
    on_press:
      - lambda: 'auto* fp = esphome::page::Page::active; if (fp) fp->on_confirm();'

  - id: !extend btn_rotary_up
    on_press:
      - lambda: 'auto* fp = esphome::page::Page::active; if (fp) fp->on_up();'

  - id: !extend btn_rotary_down
    on_press:
      - lambda: 'auto* fp = esphome::page::Page::active; if (fp) fp->on_down();'


font:
  - file: apps/dashboard/fonts/GothamRnd-Bold.ttf
    id: font_large
    size: 28
    bpp: 1
  - file: apps/dashboard/fonts/GothamRnd-Bold.ttf
    id: font_medium
    size: 22
    bpp: 1
  - file: apps/dashboard/fonts/GothamRnd-Book.ttf
    id: font_small
    size: 18
    bpp: 1

lvgl:
  displays: epd
  buffer_size: 25%
  color_depth: 16
  rotation: 180
  encoders:
    - id: main_encoder
      enter_button: btn_confirm
      sensor:
        left_button: btn_rotary_up
        right_button: btn_rotary_down
      group: actions_group
  on_draw_end:
    - lambda: |
        if (id(first_render)) {
          id(epd).force_full_update();
          id(first_render) = false;
        }
    - component.update: epd
