substitutions:
  node_name: crowpanel
  friendly_node_name: CrowPanel
  timezone: Europe/Stockholm
  page_font: font_large
  eink_display: epd
  eink_buffer_size: 25%
  eink_btn_confirm: btn_confirm
  eink_btn_up: btn_rotary_up
  eink_btn_down: btn_rotary_down

logger:
  level: VERY_VERBOSE

packages:
  common: !include ../esphome-common/common/common_eink.yaml
  hardware: !include ../esphome-common/hardware/esp32/crowpanel-4.2.yaml
  eink_hw: !include ../esphome-eink-ui/config/lvgl_eink.yaml
  eink_theme: !include ../esphome-eink-ui/config/eink_theme.yaml
  pages: !include crowpanel_pages.yaml

external_components:
  - source:
      type: local
      path: ../esphome-eink-ui/components
    components: [page]

binary_sensor:
  - id: !extend btn_menu
    on_press:
      - lvgl.page.next:
          animation: NONE

  - id: !extend btn_exit
    on_press:
      - lvgl.page.previous:
          animation: NONE

  - id: !extend btn_confirm
    on_press:
      - lambda: 'auto* fp = esphome::page::Page::active; if (fp) fp->on_confirm();'

  - id: !extend btn_rotary_up
    on_press:
      - lambda: 'auto* fp = esphome::page::Page::active; if (fp) fp->on_up();'

  - id: !extend btn_rotary_down
    on_press:
      - lambda: 'auto* fp = esphome::page::Page::active; if (fp) fp->on_down();'


font:
  - file: apps/dashboard/fonts/GothamRnd-Bold.ttf
    id: font_large
    size: 28
    bpp: 1
  - file: apps/dashboard/fonts/GothamRnd-Bold.ttf
    id: font_medium
    size: 22
    bpp: 1
  - file: apps/dashboard/fonts/GothamRnd-Book.ttf
    id: font_small
    size: 18
    bpp: 1

