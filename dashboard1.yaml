substitutions:
  node_name: dashboard1
  friendly_node_name: Dashboard Livingroom

<<: !include apps/dashboard.yaml

esphome:
  on_boot:
    priority: -100.0   # run after wifi is up
    then:
      - component.update: eink_page0

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      - seconds: 0
        minutes: /2
        then:
          - component.update: eink_page0

button:
  - platform: template
    name: "Dashboard - Refresh Screen"
    entity_category: config
    on_press:
      - component.update: eink_page0
