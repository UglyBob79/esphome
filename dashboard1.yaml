substitutions:
  node_name: dashboard1
  friendly_node_name: Dashboard Livingroom

external_components:
  - source:
      type: local
      path: components

<<: !include apps/dashboard.yaml

wifi:
  on_connect:
    then:
      - delay: 5s
      - script.execute: fetch_eink_image

time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: "America/Mexico_City"
    on_time:
      - seconds: 0
        minutes: /2
        then:
          - script.execute: fetch_eink_image

button:
  - platform: template
    name: "Dashboard - Refresh Screen"
    entity_category: config
    on_press:
      - script.execute: fetch_eink_image
